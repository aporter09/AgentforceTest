<html>
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1, minimum-scale=1">
</head>
<body>
    <h1>Agentforce Secure Portal</h1>
    
    <div id="login-box">
        <input type="text" id="username" placeholder="Enter 'andrew'">
        <button onclick="handlePortalLogin()">Log In & Initialize Chat</button>
    </div>
    <p id="status-message" style="color: green; font-weight: bold;"></p>

    <script type='text/javascript'>
        let globalCustomerId = null;

        // 1. Handle login click, talk to your free Render server, and set identity
        async function handlePortalLogin() {
            const usernameInput = document.getElementById('username').value;
            document.getElementById('status-message').innerText = "Logging in and negotiating tokens...";

            try {
                // Call your live backend server (We will get this URL from Render in Step 5)
                const response = await fetch('https://agentforce-auth-server.onrender.com/api/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ username: usernameInput })
                });

                const data = await response.json();
                
                if (data.access_token) {
                    globalCustomerId = data.customer_id;

                    // INJECT ACCESS TOKEN NATIVELY TO THE RUNTIME
                    embeddedservice_bootstrap.userVerificationAPI.setIdentityToken({
                        identityToken: data.access_token
                    });

                    document.getElementById('status-message').innerText = "Login successful! Identity locked. Open chat now.";
                    document.getElementById('login-box').style.display = 'none';
                }
            } catch (err) {
                document.getElementById('status-message').innerText = "Error negotiating identity.";
                console.error(err);
            }
        }

        function initEmbeddedMessaging() {
            try {
                embeddedservice_bootstrap.settings.language = 'en_US'; 

                // 2. Listen for the chat framework initialization event
                window.addEventListener("onEmbeddedMessagingReady", () => {
                    // Inject the customer context mapping dynamically when the chat launches
                    if (globalCustomerId) {
                        embeddedservice_bootstrap.settings.customContextParameters = {
                            "Current_Customer_Internal_ID": globalCustomerId
                        };
                    }
                });

                embeddedservice_bootstrap.init(
                    '00DPt000006cWhl',
                    'HeadlessTest',
                    'https://formula1--sfsite2.sandbox.my.site.com/ESWHeadlessTest1779465628764',
                    { scrt2URL: 'https://formula1--sfsite2.sandbox.my.salesforce-scrt.com' }
                );
            } catch (err) {
                console.error('Error loading Embedded Messaging: ', err);
            }
        };
    </script>
    <script type='text/javascript' src='https://formula1--sfsite2.sandbox.my.site.com/ESWHeadlessTest1779465628764/assets/js/bootstrap.min.js' onload='initEmbeddedMessaging()'></script>
</body>
</html>
