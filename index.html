<html>
  <head>
    <meta name="viewport" content="width=device-width, initial-scale=1, minimum-scale=1">
  </head>
  <body>
    <h1>Agentforce Test Page F1 Dev Pro</h1>

	  <button id="siteEndChatBtn" onclick="terminateActiveChat()">Force End Chat Session</button>
<script>
function terminateActiveChat() {
    // Check if the Agentforce / MIAW bootstrap API is loaded on the page
    if (window.embeddedservice_bootstrap && window.embeddedservice_bootstrap.userVerificationAPI) {
        
        // Passing true explicitly wipes the active messaging session and closes the UI window
        window.embeddedservice_bootstrap.userVerificationAPI.clearSession(true)
            .then(() => {
                console.log('Chat session terminated and container closed.');
            })
            .catch((error) => {
                console.error('Error attempting to clear chat session:', error);
            });
            
    } else {
        console.warn('Salesforce Messaging API is not active or initialized on this page.');
    }
}
</script>

<script type='text/javascript'>
	function initEmbeddedMessaging() {
		try {
			console.log('Starting to initialise the chat');
			embeddedservice_bootstrap.settings.language = 'en_US'; // For example, enter 'en' or 'en-US'
			console.log('Set the language');
			
			// --- START OF LOCALE CAPTURE LOGIC ---
			window.addEventListener("onEmbeddedMessagingReady", () => {
				console.log("Received the onEmbeddedMessagingReady event...");
				
				// Capture the user's browser locale
				const userLocale = navigator.language || navigator.userLanguage;
				console.log("Captured browser locale: " + userLocale);
				
				// Send the value down to Salesforce hidden fields
				// "Browser_Locale" must match your Custom Parameter Name in Salesforce exactly
				embeddedservice_bootstrap.prechatAPI.setHiddenPrechatFields({"vUser_Locale" : userLocale});
			});
			// --- END OF LOCALE CAPTURE LOGIC ---

			embeddedservice_bootstrap.init(
				'00Ddw000003GghV',
				'Fan_Companion_Web_Channel',
				'https://formulaonedigitalmedialimited--developer.sandbox.my.site.com/ESWFanCompanionWebChan1782305032683',
				{
					scrt2URL: 'https://formulaonedigitalmedialimited--developer.sandbox.my.salesforce-scrt.com'
				}
			);
			console.log('Initialisesation complete');
		} catch (err) {
			console.log('Error Found in loading the chat');
			console.error('Error loading Embedded Messaging: ', err);
		}
	};
</script>
<script type='text/javascript' src='https://formulaonedigitalmedialimited--developer.sandbox.my.site.com/ESWFanCompanionWebChan1782305032683/assets/js/bootstrap.min.js' onload='initEmbeddedMessaging()'></script>

  </body>
</html>
